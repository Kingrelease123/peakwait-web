<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Add me on PeakWait</title>
<link rel="icon" href="/favicon.svg">
<style>
  :root{ --bg:#070f16; --surface:#101d28; --hair:#2c3b48; --brand:#43acfb; --gold:#feb84d; --ink:#eff4f9; --ink2:#adb9c4;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(120% 80% at 50% -10%,#12212e,#070f16 60%);color:var(--ink);font-family:var(--font);
    min-height:100vh;display:grid;place-items:center;padding:28px;text-align:center}
  .card{max-width:420px;width:100%;background:var(--surface);border:1px solid var(--hair);border-radius:22px;padding:34px 26px}
  .logo{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:18px}
  .logo svg{width:30px;height:30px}
  .logo b{font-size:1.15rem;font-weight:800;letter-spacing:-.01em}
  .spark{color:var(--gold)}
  h1{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;line-height:1.2;margin-bottom:8px;text-wrap:balance}
  h1 .h{color:var(--brand)}
  p{color:var(--ink2);font-size:.95rem;line-height:1.5;margin-bottom:22px}
  .btn{display:block;background:var(--gold);color:#1a1205;font-weight:800;text-decoration:none;border-radius:13px;padding:14px;font-size:1rem}
  .step{color:var(--ink2);font-size:.8rem;margin-top:16px;line-height:1.5}
  .step b{color:var(--ink)}
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="#43acfb" stroke-width="1.8" stroke-linejoin="round"><path d="M3 20l6-11 4 6 2-3 6 8z"/></svg><b>PeakWait</b></div>
    <h1><span id="who">A friend</span> wants to ski with you</h1>
    <p>PeakWait shows live lift waits, points you to the shortest lines, and lets your crew find each other on the mountain.</p>
    <a class="btn" href="https://apps.apple.com/app/peakwait/id6793253589">Get PeakWait — free</a>
    <div class="step">Already have the app? Open it, go to <b>Settings → Friends &amp; Family → Add a friend</b> and enter <b id="handle">their handle</b>.</div>
  </div>
  <script>
    // Read the inviter's handle from ?h= and personalize (no tracking, just display).
    var h = new URLSearchParams(location.search).get('h');
    if (h && /^[A-Za-z0-9_]{3,20}$/.test(h)) {
      document.getElementById('who').textContent = '@' + h;
      document.getElementById('handle').textContent = '@' + h;
    }
  </script>
</body>
</html>
